<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Personalized Plan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>My Smart Nutrition Plan</h1>

    <div class="nav-bar">
        <a href="index.html">Home</a>
        <a href="recommend.html">My Plan</a>
    </div>

    <div class="stats">
        <h3 id="totalCal">Total: 0</h3>
        <h3 id="avgCal">Average: 0</h3>

        <div>
            <button onclick="updateQuantity()">Update Quantity</button>
            <button onclick="window.location='index.html'" class="back-btn">Back to Home</button>

    </div>

    <script src="crud.js"></script>
